<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISEPARKING - Reports</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    
    <header class="navbar">
      <div class="logo">
        <img src="images/logo.png" alt="logo" width="96" height="42">
      </div>
      <button class="nav-toggle" aria-label="Abrir menú">☰</button>
      <nav class="nav">
        <ul class="menu">
          <li><a href="index.html">Sign out</a></li>
        </ul>
      </nav>
    </header>
    
    <main>
        <section class="admin-panel">
            
            <div class="back-nav">
            <a href="register-vehicle.html">Back to admin &larr;</a>
        </div>
        
            <div class="reports-header">
                <p class="description" style="font-size: 18px; color: white;">
                    Get a detail report of the historic vehicles
                </p>
            </div>

            <div class="dashboard-container">
                
                <div class="admin-form-container">
                    <form>
                        <div class="form-row">
                            <label>Date range</label>
                            <input type="date" class="date-input"> 
                        </div>

                        <div class="form-row">
                            <label></label> 
                            <button type="button" class="download-btn">Download 📥</button>
                        </div>
                    </form>
                </div>

                <div class="admin-image reports-specific">
                    <img src="images/reports.png" alt="Reports Icon">
                </div>

            </div>
        </section>

        <section class="Contact-us" id="contact">
            <h2>Contact us</h2>
            <div class="contact-container">
              <div class="contact-item">
                <h3>Call us</h3>
                <p>+573224121883</p>
              </div>
              <div class="contact-item whatsapp">
                <h3>WhatsApp</h3>
                <p>+573224121883</p>
              </div>
              <div class="contact-item instagram">
                <h3>Instagram</h3>
                <p>@wiseparking</p>
              </div>
            </div>
        </section>

    </main>

    <script>
        const navToggle = document.querySelector(".nav-toggle");
        const navMenu = document.querySelector(".menu");
        navToggle.addEventListener("click", () => {
          navMenu.classList.toggle("nav-visible");
        });
    </script>
</body>
</html>
