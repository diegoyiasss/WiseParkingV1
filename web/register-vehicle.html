<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISEPARKING - Register Vehicle</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    
    <header class="navbar">
      <div class="logo">
        <img src="images/logo.png" alt="logo" width="96" height="42">
      </div>
      <button class="nav-toggle" aria-label="Abrir menú">☰</button>
      <nav class="nav">
        <ul class="menu">
          <li><a href="reports.html">Reports</a></li>
          <li><a href="index.html">Sign out</a></li>
        </ul>
      </nav>
    </header>
    
    <main>
        <section class="admin-panel">
            
            <div class="admin-links">
                <a href="register-vehicle.html" class="active-link">Register vehicle</a>
                <a href="exit-vehicle.html">Exit vehicle</a>
                <a href="admin.html">Admin vehicles</a>
            </div>

            <p class="description">Register the vehicles, add the arrival time, license plate, and vehicle type</p>

            <div class="dashboard-container">
                
                <div class="admin-form-container">
                    <!-- PASO 3: Agregamos action y method al form -->
                    <form action="RegistroServlet" method="POST" id="registroForm">
                        <div class="form-row">
                            <label>Owner name</label>
                            <!-- Agregamos el name -->
                            <input type="text" name="ownerName">
                        </div>
                        
                        <div class="form-row">
                            <label>Arrival time</label>
                            <!-- Agregamos el name -->
                            <input type="text" readonly id="arrival-time" name="arrivalTime"> 
                        </div>

                        <div class="form-row">
                            <label>Vehicle type</label>
                            <!-- Agregamos el name al select y los values a las opciones -->
                            <select name="vehicleType">
                                <option value="1">Car</option>
                                <option value="2">Motorcycle</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label>License plate</label>
                            <!-- Agregamos el name y lo hacemos requerido -->
                            <input type="text" placeholder="ABC-123" name="licensePlate" required>
                        </div>

                        <div class="form-row">
                            <label></label> 
                            <button type="submit" class="save-btn">Save Vehicle</button>
                        </div>
                    </form>
                </div>

                <div class="admin-image">
                    <img src="images/RegisterVehicle.png" alt="Garage">
                </div>

            </div>
        </section>

        <section class="Contact-us" id="contact">
            <h2>Contact us</h2>
            <div class="contact-container">
              <div class="contact-item">
                <h3>Call us</h3>
                <p>+573224121883</p>
              </div>
              <div class="contact-item whatsapp">
                <h3>WhatsApp</h3>
                <p>+573224121883</p>
              </div>
              <div class="contact-item instagram">
                <h3>Instagram</h3>
                <p>@wiseparking</p>
              </div>
            </div>
        </section>

    </main>

<script>
        // --- 1. LÓGICA DEL MENÚ DE NAVEGACIÓN ---
        const navToggle = document.querySelector(".nav-toggle");
        const navMenu = document.querySelector(".menu");
        
        navToggle.addEventListener("click", () => {
          navMenu.classList.toggle("nav-visible");
        });

        // --- 2. LÓGICA DE GUARDADO AUTOMÁTICO DE FECHA ---
        const form = document.getElementById('registroForm');
        const arrivalInput = document.getElementById('arrival-time');

        // Escuchamos el evento 'submit' (cuando se envía el formulario)
        form.addEventListener('submit', (event) => {
            
            // Obtenemos la fecha y hora actual
            const now = new Date();
            
            // Ajustamos la fecha al formato que espera Java (YYYY-MM-DDTHH:MM)
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            const formatoJava = now.toISOString().slice(0, 16);
            
            // Escribimos la fecha en el input justo antes de que viaje a Java
            arrivalInput.value = formatoJava; 
            
            // OJO: Ya no usamos event.preventDefault().
            // Queremos que el formulario continúe su camino natural hacia el RegistroServlet.
            alert("Enviando vehículo a la base de datos...");
        });
    </script>
</body>
</html>
