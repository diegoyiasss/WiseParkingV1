<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISEPARKING - Exit Vehicle</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    
    <header class="navbar">
      <div class="logo">
        <img src="images/logo.png" alt="logo" width="96" height="42">
      </div>
      <button class="nav-toggle" aria-label="Abrir menú">☰</button>
      <nav class="nav">
        <ul class="menu">
          <li><a href="reports.html">Reports</a></li>
          <li><a href="index.html">Sign out</a></li>
        </ul>
      </nav>
    </header>
    
    <main>
        <section class="admin-panel">
            
            <div class="admin-links">
                <a href="register-vehicle.html">Register vehicle</a>
                <a href="exit-vehicle.html" class="active-link">Exit vehicle</a>
                <a href="admin.jsp.html">Admin vehicles</a>
            </div>

            <p class="description">Exit a vehicle from the parking lot</p>

            <div class="dashboard-container">
                
                <div class="admin-form-container">
                    <form>
                        <div class="form-row search-row">
                            <label>License plate</label>
                            <div class="search-group">
                                <input type="text" placeholder="ABC-123">
                                <button type="button" class="search-btn">🔍 Search</button>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <label>Owner name</label>
                            <input type="text" readonly>
                        </div>

                        <div class="form-row">
                            <label>Arrival time</label>
                            <input type="text" readonly>
                        </div>

                        <div class="form-row">
                            <label>Exit time</label>
                            <input type="text" readonly>
                        </div>

                        <div class="form-row">
                            <label>Charge</label>
                            <input type="text" readonly>
                        </div>
                        
                         <div class="form-row">
                            <label></label> 
                            <button type="submit" class="save-btn">Process Exit</button>
                        </div>

                    </form>
                </div>

                <div class="admin-image exit-specific">
                    <img src="images/ExitVehicle.png" alt="Thank You Sign">
                </div>

            </div>
        </section>

        <section class="Contact-us" id="contact">
            <h2>Contact us</h2>
            <div class="contact-container">
              <div class="contact-item">
                <h3>Call us</h3>
                <p>+573224121883</p>
              </div>
              <div class="contact-item whatsapp">
                <h3>WhatsApp</h3>
                <p>+573224121883</p>
              </div>
              <div class="contact-item instagram">
                <h3>Instagram</h3>
                <p>@wiseparking</p>
              </div>
            </div>
        </section>

    </main>

    <script>
        const navToggle = document.querySelector(".nav-toggle");
        const navMenu = document.querySelector(".menu");
        navToggle.addEventListener("click", () => {
          navMenu.classList.toggle("nav-visible");
        });
    </script>
</body>
</html>
